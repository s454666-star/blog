<VirtualHost *:80>
    ServerName crm.mystar.monster
    DocumentRoot /var/www/html/blog/public

    <Directory /var/www/html/blog/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteRule ^/?\.well-known/acme-challenge/ - [L]
    RewriteRule ^/?(.*)$ https://crm.mystar.monster/$1 [R=301,L,NE]

    ErrorLog ${APACHE_LOG_DIR}/crm.mystar.monster-error.log
    CustomLog ${APACHE_LOG_DIR}/crm.mystar.monster-access.log combined
</VirtualHost>
